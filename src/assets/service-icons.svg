<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Custom Software Development Icon -->
  <g transform="translate(100, 10)">
    <rect x="5" y="5" width="50" height="70" rx="5" fill="none" stroke="#1976d2" stroke-width="2"/>
    <circle cx="30" cy="15" r="5" fill="#1976d2"/>
    <line x1="15" y1="30" x2="45" y2="30" stroke="#1976d2" stroke-width="2"/>
    <line x1="15" y1="40" x2="45" y2="40" stroke="#1976d2" stroke-width="2"/>
    <line x1="15" y1="50" x2="35" y2="50" stroke="#1976d2" stroke-width="2"/>
    <text x="30" y="90" text-anchor="middle" font-size="12" fill="#1976d2">Code</text>
  </g>

  <!-- Digital Transformation Icon -->
  <g transform="translate(300, 10)">
    <path d="M30,10 L50,30 L30,50 L10,30 Z" fill="none" stroke="#1976d2" stroke-width="2"/>
    <circle cx="30" cy="30" r="15" fill="none" stroke="#1976d2" stroke-width="2"/>
    <path d="M30,20 L30,40 M20,30 L40,30" stroke="#1976d2" stroke-width="2"/>
    <text x="30" y="90" text-anchor="middle" font-size="12" fill="#1976d2">Transform</text>
  </g>

  <!-- Cloud Solutions Icon -->
  <g transform="translate(500, 10)">
    <path d="M25,45 Q10,45 10,30 Q10,15 25,15 Q25,5 40,5 Q55,5 55,20 Q70,20 70,35 Q70,45 55,45 Z" fill="none" stroke="#1976d2" stroke-width="2"/>
    <path d="M30,25 L40,35 L50,25" fill="none" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="90" text-anchor="middle" font-size="12" fill="#1976d2">Cloud</text>
  </g>

  <!-- Enterprise Integration Icon -->
  <g transform="translate(700, 10)">
    <circle cx="20" cy="20" r="15" fill="none" stroke="#1976d2" stroke-width="2"/>
    <circle cx="50" cy="50" r="15" fill="none" stroke="#1976d2" stroke-width="2"/>
    <line x1="31" y1="31" x2="39" y2="39" stroke="#1976d2" stroke-width="2"/>
    <text x="35" y="90" text-anchor="middle" font-size="12" fill="#1976d2">Connect</text>
  </g>
