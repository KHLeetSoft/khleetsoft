<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <!-- Healthcare Icon -->
  <g transform="translate(100,100)">
    <circle cx="0" cy="0" r="35" fill="#9C2340" opacity="0.9" />
    <path d="M-15,0 L15,0 M0,-15 L0,15" stroke="white" stroke-width="4" />
  </g>
  
  <!-- Finance Icon -->
  <g transform="translate(300,100)">
    <rect x="-30" y="-30" width="60" height="60" rx="8" fill="#9C2340" opacity="0.9" />
    <text x="0" y="10" font-family="Arial" font-size="40" fill="white" text-anchor="middle">$</text>
  </g>
  
  <!-- Manufacturing Icon -->
  <g transform="translate(500,100)">
    <path d="M-30,-30 L0,-30 L30,0 L30,30 L-30,30 Z" fill="#9C2340" opacity="0.9" />
    <path d="M-15,0 L15,0 M0,-15 L0,15" stroke="white" stroke-width="2" />
  </g>
  
  <!-- Education Icon -->
  <g transform="translate(700,100)">
    <path d="M-30,15 L0,-15 L30,15 L0,0 Z" fill="#9C2340" opacity="0.9" />
    <circle cx="0" cy="0" r="5" fill="white" />
  </g>
</svg>